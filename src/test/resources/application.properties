# ── Test datasource (H2 in-memory) ──────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA ─────────────────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# ── Flyway — disable in tests (no real schema needed; @MockBean prevents DB queries) ──
spring.flyway.enabled=false

# ── JWT ─────────────────────────────────────────────────────────────────────
rums.jwt.secret=dGVzdFNlY3JldEtleUZvclRlc3RpbmdQdXJwb3Nlc09ubHkxMjM0NTY=
rums.jwt.access-expiry-seconds=28800
rums.jwt.refresh-expiry-seconds=604800

# ── File storage ─────────────────────────────────────────────────────────────
rums.files.upload-dir=./uploads/

# ── CORS ─────────────────────────────────────────────────────────────────────
rums.cors.allowed-origin=http://localhost:3000

# ── Mail (stub — no real SMTP needed in tests) ────────────────────────────────
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=noreply@rura.rw
spring.mail.password=test
